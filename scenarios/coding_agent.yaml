name: coding_agent
description: Code generation and review tasks simulating coding agent (opencode) usage patterns

defaults:
  model: gpt-4o
  temperature: 0.0
  max_tokens: 1024

cases:
  - name: code_completion
    messages:
      - role: user
        content: |
          Complete the following Python function:

          def merge_sorted_lists(list1: list[int], list2: list[int]) -> list[int]:
              """Merge two sorted lists into a single sorted list."""

  - name: bug_fix
    messages:
      - role: user
        content: |
          Find and fix the bug in this binary search implementation:

          def binary_search(arr: list[int], target: int) -> int:
              left, right = 0, len(arr)
              while left < right:
                  mid = (left + right) // 2
                  if arr[mid] == target:
                      return mid
                  elif arr[mid] < target:
                      left = mid
                  else:
                      right = mid
              return -1

  - name: code_review
    messages:
      - role: user
        content: |
          Review this FastAPI endpoint for security issues and suggest fixes:

          from fastapi import FastAPI
          import sqlite3

          app = FastAPI()

          @app.get("/users/{user_id}")
          def get_user(user_id: str):
              conn = sqlite3.connect("app.db")
              cursor = conn.cursor()
              cursor.execute(f"SELECT * FROM users WHERE id = '{user_id}'")
              user = cursor.fetchone()
              conn.close()
              return {"user": user}

  - name: code_with_tools
    messages:
      - role: user
        content: "Read the file src/main.py, find any TODO comments, and write a fixed version."
    tools:
      - type: function
        function:
          name: read_file
          description: Read the contents of a file at the given path.
          parameters:
            type: object
            properties:
              path:
                type: string
                description: File path to read
            required: [path]
      - type: function
        function:
          name: write_file
          description: Write content to a file at the given path.
          parameters:
            type: object
            properties:
              path:
                type: string
                description: File path to write
              content:
                type: string
                description: Content to write
            required: [path, content]
